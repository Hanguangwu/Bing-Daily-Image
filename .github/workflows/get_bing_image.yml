name: Daily Get Bing Image

permissions:
  contents: write
  actions: write

on:
  schedule:
    # 北京时间 04:00 执行 = UTC 前一天 20:00
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  get_bing_image:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests

      - name: Fetch page branch content into static/
        run: |
          if git ls-remote --exit-code --heads origin page; then
            git fetch origin page
            rm -rf static
            mkdir -p static
            git --work-tree=static checkout origin/page -- .
          else
            echo "No 'page' branch exists, creating empty static dir."
            mkdir -p static
          fi
          ls -la static

      - name: Run Python script to get Bing image
        run: python main.py

      # 拷贝 page 目录静态资源到 static（保留你原有逻辑）
      - name: Copy page assets to static
        run: |
          cp -f ./page/index.html static/
          cp -f ./page/favicon.ico static/
          cp -f ./page/readme.md static/
          cp -f ./page/edgeone.json static/
          cp -f ./page/CNAME static/

      # 专用 Action 推送 static 目录到 page 分支，无视 .gitignore
      - name: Deploy static to page branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./static
          publish_branch: page  # 指定推送到 page 分支
          commit_message: "⏱️GitHub Action 每日定时更新 Bing 壁纸"
          force_orphan: false

      - name: Delete Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 30
          keep_minimum_runs: 6

  keepalive-workflow:
    name: Keepalive Workflow
    if: ${{ always() }}
    needs: get_bing_image
    runs-on: ubuntu-latest
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
